# configs/infer_toulmin_dpo.yaml
# Inference + eval for the Toulmin DPO adapter on psi_test_eval_v2.jsonl.
# Launch only after DPO training completes — verify
#   /workspace/checkpoints/toulmin_dpo/adapter_config.json exists first.
#
# Run:
#   CUDA_VISIBLE_DEVICES=1 python infer_eval.py --config configs/infer_toulmin_dpo.yaml
#
# Smoke test (5 records):
#   CUDA_VISIBLE_DEVICES=1 python infer_eval.py --config configs/infer_toulmin_dpo.yaml --smoke

model_id:     nvidia/Cosmos-Reason2-8B
adapter_path: /workspace/checkpoints/toulmin_dpo
format:       toulmin

# ── Data paths ────────────────────────────────────────────────────────────────
eval_path:    /workspace/PSI_change/json_mode_90/psi_test_eval_v2.jsonl
output_path:  /workspace/PSI_change/json_mode_90/predictions/toulmin_dpo_predictions.jsonl
metrics_path: /workspace/PSI_change/json_mode_90/predictions/toulmin_dpo_metrics.json

# ── Sampling ──────────────────────────────────────────────────────────────────
n_samples:      1
temperature:    0.1
top_p:          0.95
max_new_tokens: 256
seed:           42

# ── Video decoding (must match training) ─────────────────────────────────────
num_video_frames:    90
frame_size:          112
max_pixels_per_frame: 12544
