# configs/toulmin_dpo.yaml
# DPO fine-tuning of the Toulmin SFT model on PSI preference pairs.
# Continues training the SFT LoRA adapter — no new adapter is added.
#
# Run:
#   CUDA_VISIBLE_DEVICES=0 python train_dpo.py --config configs/toulmin_dpo.yaml
#
# Smoke test (5 optimizer steps):
#   CUDA_VISIBLE_DEVICES=0 python train_dpo.py --config configs/toulmin_dpo.yaml --smoke

model_id: nvidia/Cosmos-Reason2-8B
sft_adapter_path: /workspace/checkpoints/toulmin_sft

# ── Data paths (Docker /workspace/ mount) ────────────────────────────────────
train_path: /workspace/PSI_change/json_mode_90/trf_train/psi_dpo_toulmin_matched_train.jsonl
val_path:   /workspace/PSI_change/json_mode_90/trf_train/psi_dpo_toulmin_matched_val.jsonl
output_dir: /workspace/checkpoints/toulmin_dpo

# ── DPO hyperparameters ───────────────────────────────────────────────────────
beta: 0.1
num_train_epochs: 1          # bump to 2 if reward_margin still climbing at epoch end
learning_rate: 5.0e-6
gradient_accumulation_steps: 8
warmup_steps: 20
lr_scheduler_type: cosine
max_grad_norm: 1.0
logging_steps: 5
eval_every_steps: 50
save_at_epoch_end: true
bf16: true
seed: 42

# ── Video decoding ────────────────────────────────────────────────────────────
num_video_frames: 90
frame_size: 112
max_pixels_per_frame: 12544    # 112×112; sets min_pixels=3136 / max_pixels=12544
