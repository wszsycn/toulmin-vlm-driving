# configs/toulmin_kto.yaml
# KTO fine-tuning of the Toulmin SFT model on PSI preference pairs.
# KTO (Ethayarajh et al. 2024) trains on independent labeled examples
# (no pairing required) using an asymmetric prospect-theoretic value function.
#
# Inputs: DPO JSONL — each pair is automatically expanded to 2 KTO records.
# Output: fine-tuned LoRA adapter at /workspace/checkpoints/toulmin_kto
#
# Run:
#   CUDA_VISIBLE_DEVICES=1 python train_kto.py --config configs/toulmin_kto.yaml
#
# Smoke test (16 examples, 5 optimizer steps):
#   CUDA_VISIBLE_DEVICES=1 python train_kto.py --config configs/toulmin_kto.yaml --smoke

model_id: nvidia/Cosmos-Reason2-8B

# Use v3 SFT if available; fall back to v2 if not yet retrained.
sft_adapter_path: /workspace/checkpoints/toulmin_sft_v3
# sft_adapter_path: /workspace/checkpoints/toulmin_sft   # v2 fallback

# ── Data paths (v3 matched intersection — same as IPO) ───────────────────────
train_path: /workspace/PSI_change/json_mode_90/trf_train_v3/psi_dpo_toulmin_matched_train.jsonl
val_path:   /workspace/PSI_change/json_mode_90/trf_train_v3/psi_dpo_toulmin_matched_val.jsonl
output_dir: /workspace/checkpoints/toulmin_kto

# ── KTO hyperparameters ───────────────────────────────────────────────────────
method: kto
beta: 0.1

# lambda_desirable: "auto" computes n_undesirable / n_desirable from train data.
# For paired DPO input this is always 1.0; set explicitly if using unpaired data.
lambda_desirable:   auto
lambda_undesirable: 1.0

# KL EMA smoothing factor (alpha=0.1 → 10-step half-life).
kl_ema_alpha: 0.1

num_train_epochs: 1
learning_rate: 5.0e-6
gradient_accumulation_steps: 8
warmup_steps: 20
lr_scheduler_type: cosine
max_grad_norm: 1.0
logging_steps: 5
eval_every_steps: 50
save_at_epoch_end: true
bf16: true
seed: 42

# ── Video decoding (must match SFT training) ──────────────────────────────────
num_video_frames: 90
frame_size: 112
max_pixels_per_frame: 12544    # 112x112; sets min_pixels=3136 / max_pixels=12544
