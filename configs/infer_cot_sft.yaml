# configs/infer_cot_sft.yaml
# Inference + eval for the CoT SFT adapter on psi_test_eval_v2_cot.jsonl.
#
# Run:
#   CUDA_VISIBLE_DEVICES=1 python infer_eval.py --config configs/infer_cot_sft.yaml
#
# Smoke test (5 records):
#   CUDA_VISIBLE_DEVICES=1 python infer_eval.py --config configs/infer_cot_sft.yaml --smoke

model_id:     nvidia/Cosmos-Reason2-8B
adapter_path: /workspace/checkpoints/cot_sft
format:       cot

# ── Data paths ────────────────────────────────────────────────────────────────
eval_path:    /workspace/PSI_change/json_mode_90/psi_test_eval_v2_cot.jsonl
output_path:  /workspace/PSI_change/json_mode_90/predictions/cot_sft_predictions.jsonl
metrics_path: /workspace/PSI_change/json_mode_90/predictions/cot_sft_metrics.json

# ── Sampling ──────────────────────────────────────────────────────────────────
n_samples:      1
temperature:    0.1
top_p:          0.95
max_new_tokens: 256
seed:           42

# ── Video decoding (must match training) ─────────────────────────────────────
num_video_frames:    90
frame_size:          112
max_pixels_per_frame: 12544
