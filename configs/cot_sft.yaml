# configs/cot_sft.yaml
# SFT on CoT baseline data.
# system/prompt/completion are taken verbatim from the JSONL — no YAML prompt.
#
# Run:
#   CUDA_VISIBLE_DEVICES=1 python train_sft.py --config configs/cot_sft.yaml
#
# Smoke test (5 steps):
#   CUDA_VISIBLE_DEVICES=1 python train_sft.py --config configs/cot_sft.yaml --smoke

model_id: nvidia/Cosmos-Reason2-8B
format: cot   # informational only — does not drive text rendering

# ── Data paths (Docker /workspace/ mount) ────────────────────────────────────
train_path: /workspace/PSI_change/json_mode_90/trf_train/psi_sft_cot_matched_train.jsonl
val_path:   /workspace/PSI_change/json_mode_90/trf_train/psi_sft_cot_matched_val.jsonl
output_dir: /workspace/checkpoints/cot_sft

# ── Training hyperparameters ─────────────────────────────────────────────────
num_train_epochs: 3
learning_rate: 1.0e-4
gradient_accumulation_steps: 8
warmup_ratio: 0.03
lr_scheduler_type: cosine
logging_steps: 10
seed: 42

# ── Video decoding ────────────────────────────────────────────────────────────
num_video_frames: 90
frame_size: 112                # per-frame decode resolution (cached at this size)
max_pixels_per_frame: 12544    # 112*112; passed to processor for dynamic patching
