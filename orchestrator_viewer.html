<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orchestrator Toulmin Viewer</title>
<style>
  :root {
    --bg:        #0e0f11;
    --bg2:       #16181c;
    --bg3:       #1e2026;
    --border:    #2a2d35;
    --border2:   #363a45;
    --text:      #e2e4ea;
    --text2:     #8b8fa8;
    --text3:     #555a6e;
    --purple:    #7c6af7;
    --purple-bg: #1e1a3a;
    --teal:      #2ec4a0;
    --teal-bg:   #0f2620;
    --coral:     #f07050;
    --coral-bg:  #2a1810;
    --amber:     #e8a030;
    --amber-bg:  #261e08;
    --green:     #4caf7d;
    --green-bg:  #0d2018;
    --red:       #e05555;
    --red-bg:    #280e0e;
    --gray:      #5a5f70;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--purple);
  }
  .logo span { color: var(--text2); font-weight: 400; }
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-left: auto;
    font-size: 12px;
    color: var(--text2);
  }
  .stat { display: flex; align-items: center; gap: 5px; }
  .stat-val { color: var(--text); font-weight: 600; font-size: 13px; }
  .stat-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* ── Main layout ── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--bg2);
  }
  .sidebar-top {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  .search-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 12px;
    width: 100%;
    outline: none;
    font-family: inherit;
  }
  .search-box::placeholder { color: var(--text3); }
  .search-box:focus { border-color: var(--purple); }

  .filter-row {
    display: flex;
    gap: 4px;
  }
  .filter-btn {
    flex: 1;
    padding: 5px 0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .04em;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--purple-bg); border-color: var(--purple); color: var(--purple); }
  .filter-btn.f-ok.active   { background: var(--green-bg);  border-color: var(--green);  color: var(--green); }
  .filter-btn.f-fail.active { background: var(--red-bg);    border-color: var(--red);    color: var(--red); }

  .list-wrap {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  .list-item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background .1s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .list-item:hover { background: var(--bg3); }
  .list-item.selected { background: var(--purple-bg); border-left: 2px solid var(--purple); }

  .item-row1 {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .item-id {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text2);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .06em;
    padding: 2px 6px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .badge-ok   { background: var(--green-bg);  color: var(--green); border: 1px solid #1a4030; }
  .badge-fail { background: var(--red-bg);    color: var(--red);   border: 1px solid #3a1515; }
  .badge-yes  { background: var(--teal-bg);   color: var(--teal);  border: 1px solid #1a3828; }
  .badge-no   { background: var(--coral-bg);  color: var(--coral); border: 1px solid #3a2018; }
  .badge-rnd  { background: var(--amber-bg);  color: var(--amber); border: 1px solid #3a2a08; font-size:9px; }

  .item-grounds {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Detail panel ── */
  .detail {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .detail-scroll {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Drop zone ── */
  .drop-zone {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    border: 2px dashed var(--border2);
    border-radius: 16px;
    margin: 40px;
    cursor: pointer;
    transition: all .2s;
  }
  .drop-zone:hover, .drop-zone.drag { border-color: var(--purple); background: var(--purple-bg); }
  .drop-icon { font-size: 40px; opacity: .4; }
  .drop-label { color: var(--text2); font-size: 14px; }
  .drop-sub { color: var(--text3); font-size: 12px; }
  #file-input { display: none; }

  /* ── Video ── */
  .video-wrap {
    background: #000;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    aspect-ratio: 16/9;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .no-video {
    color: var(--text3);
    font-size: 12px;
    text-align: center;
    padding: 20px;
  }

  /* ── Meta row ── */
  .meta-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .meta-id {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text2);
    flex: 1;
    word-break: break-all;
  }

  /* ── Rounds ── */
  .section-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }

  .rounds-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .round-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .round-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .round-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--amber);
  }
  .round-status {
    margin-left: auto;
    font-size: 10px;
    font-weight: 600;
  }
  .round-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
  .round-body.collapsed { display: none; }

  /* ── Toulmin blocks ── */
  .toulmin-block {
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .tb-header {
    padding: 6px 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tb-body {
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    background: var(--bg);
  }

  .tb-grounds .tb-header  { background: var(--purple-bg); color: var(--purple); border-bottom: 1px solid #2d2550; }
  .tb-warrant .tb-header  { background: var(--teal-bg);   color: var(--teal);   border-bottom: 1px solid #1a3830; }
  .tb-answer  .tb-header  { background: var(--bg3);       color: var(--text2);  border-bottom: 1px solid var(--border); }
  .tb-answer  .tb-body    { font-weight: 700; font-size: 15px; }
  .answer-yes { color: var(--teal); }
  .answer-no  { color: var(--coral); }

  /* ── Thinking CoT ── */
  .cot-block {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .cot-toggle {
    padding: 7px 12px;
    font-size: 11px;
    color: var(--text3);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: inherit;
  }
  .cot-toggle:hover { color: var(--text2); }
  .cot-content {
    padding: 10px 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.7;
    color: var(--text2);
    white-space: pre-wrap;
    word-break: break-word;
    border-top: 1px solid var(--border);
    max-height: 280px;
    overflow-y: auto;
  }

  /* ── Critic result ── */
  .critic-bar {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    border: 1px solid;
  }
  .critic-ok   { background: var(--green-bg); border-color: #1a4030; color: var(--green); }
  .critic-fail { background: var(--red-bg);   border-color: #3a1515; color: var(--red); }
  .critic-reason { color: var(--text2); font-size: 12px; line-height: 1.5; }

  /* ── PSI text panel ── */
  .psi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .psi-field {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
  }
  .psi-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 4px;
  }
  .psi-val {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.5;
  }
  .psi-val.empty { color: var(--text3); font-style: italic; }

  /* ── Agent A/B thinking panels ── */
  .ab-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">Orchestrator <span>Toulmin Viewer</span></div>
  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat"><div class="stat-dot" style="background:var(--text2)"></div><span>Total</span><span class="stat-val" id="s-total">0</span></div>
    <div class="stat"><div class="stat-dot" style="background:var(--green)"></div><span>Critic OK</span><span class="stat-val" id="s-ok">0</span></div>
    <div class="stat"><div class="stat-dot" style="background:var(--red)"></div><span>Failed</span><span class="stat-val" id="s-fail">0</span></div>
    <div class="stat"><div class="stat-dot" style="background:var(--amber)"></div><span>Avg rounds</span><span class="stat-val" id="s-rounds">—</span></div>
  </div>
</header>

<main>
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-top">
      <input class="search-box" id="search" placeholder="Search ID or grounds…" oninput="applyFilter()">
      <div class="filter-row">
        <button class="filter-btn active" data-f="all"  onclick="setFilter('all')">ALL</button>
        <button class="filter-btn f-ok"   data-f="ok"   onclick="setFilter('ok')">✓ OK</button>
        <button class="filter-btn f-fail" data-f="fail" onclick="setFilter('fail')">✗ FAIL</button>
        <button class="filter-btn"        data-f="yes"  onclick="setFilter('yes')">YES</button>
        <button class="filter-btn"        data-f="no"   onclick="setFilter('no')">NO</button>
      </div>
    </div>
    <div class="list-wrap" id="list-wrap"></div>
  </div>

  <!-- Detail -->
  <div class="detail" id="detail">
    <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:40px;">
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="drop-icon">⬆</div>
        <div class="drop-label">Drop orchestrator output JSONL here</div>
        <div class="drop-sub">or click to browse · psi_toulmin_orchestrator.jsonl</div>
      </div>
      <input type="file" id="file-input" accept=".jsonl,.json" onchange="loadFile(this)">
    </div>
  </div>
</main>

<script>
let records = [];
let filtered = [];
let currentIdx = -1;
let activeFilter = 'all';

// ── Drop zone ──
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});

function loadFile(input) {
  const file = input.files[0];
  if (file) readFile(file);
}

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.trim().split('\n');
    records = lines.map(l => { try { return JSON.parse(l); } catch(e) { return null; } }).filter(Boolean);
    init();
  };
  reader.readAsText(file);
}

function init() {
  updateStats();
  applyFilter();
  document.getElementById('stats-bar').style.display = 'flex';
}

function updateStats() {
  const t = records.length;
  const ok = records.filter(r => r.toulmin?.critic_ok).length;
  const fail = t - ok;
  const rounds = records.map(r => r.toulmin?.rounds?.length || 1);
  const avg = rounds.length ? (rounds.reduce((a,b)=>a+b,0)/rounds.length).toFixed(1) : '—';
  document.getElementById('s-total').textContent  = t;
  document.getElementById('s-ok').textContent     = ok;
  document.getElementById('s-fail').textContent   = fail;
  document.getElementById('s-rounds').textContent = avg;
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.f === f));
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('search').value.toLowerCase();
  filtered = records.filter(r => {
    const t = r.toulmin || {};
    if (activeFilter === 'ok'   && !t.critic_ok) return false;
    if (activeFilter === 'fail' &&  t.critic_ok) return false;
    if (activeFilter === 'yes'  && t.answer !== 'yes') return false;
    if (activeFilter === 'no'   && t.answer !== 'no')  return false;
    if (q) {
      const hay = (r.id + (t.grounds||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  renderList();
}

function renderList() {
  const wrap = document.getElementById('list-wrap');
  wrap.innerHTML = filtered.map((r, i) => {
    const t = r.toulmin || {};
    const okBadge   = t.critic_ok
      ? `<span class="badge badge-ok">✓ OK</span>`
      : `<span class="badge badge-fail">✗ FAIL</span>`;
    const ansBadge  = t.answer === 'yes'
      ? `<span class="badge badge-yes">YES</span>`
      : `<span class="badge badge-no">NO</span>`;
    const rounds = t.rounds?.length || 1;
    const rndBadge = rounds > 1 ? `<span class="badge badge-rnd">R${rounds}</span>` : '';
    const grounds  = (t.grounds || '').slice(0, 120);
    return `<div class="list-item" data-i="${i}" onclick="selectItem(${i})">
      <div class="item-row1">
        <span class="item-id">${esc(r.id)}</span>
        ${okBadge}${ansBadge}${rndBadge}
      </div>
      <div class="item-grounds">${esc(grounds)}</div>
    </div>`;
  }).join('');
  if (currentIdx >= 0) {
    const el = wrap.querySelector(`[data-i="${currentIdx}"]`);
    if (el) el.classList.add('selected');
  }
}

function selectItem(i) {
  currentIdx = i;
  document.querySelectorAll('.list-item').forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`.list-item[data-i="${i}"]`);
  if (el) el.classList.add('selected');
  renderDetail(filtered[i]);
}

function renderDetail(r) {
  const t = r.toulmin || {};
  const meta = r.meta || {};
  const raw  = r.raw_annotation || {};
  const promts = raw.promts || {};

  // video path → http
  let videoSrc = '';
  if (r.video) {
    videoSrc = window.location.origin + r.video;
  }

  const rounds = t.rounds || [];
  const finalRound = rounds[rounds.length - 1] || {};

  document.getElementById('detail').innerHTML = `
<div class="detail-scroll">

  <!-- Meta -->
  <div class="meta-row">
    <span class="meta-id">${esc(r.id)}</span>
    ${t.critic_ok ? '<span class="badge badge-ok" style="font-size:11px;padding:3px 8px;">✓ Critic OK</span>' : '<span class="badge badge-fail" style="font-size:11px;padding:3px 8px;">✗ Critic failed</span>'}
    ${t.answer === 'yes' ? '<span class="badge badge-yes" style="font-size:11px;padding:3px 8px;">answer: YES</span>' : '<span class="badge badge-no" style="font-size:11px;padding:3px 8px;">answer: NO</span>'}
    ${rounds.length > 1 ? `<span class="badge badge-rnd" style="font-size:11px;padding:3px 8px;">${rounds.length} rounds</span>` : ''}
  </div>

  <!-- Video -->
  <div class="video-wrap">
    ${videoSrc
      ? `<video controls src="${esc(videoSrc)}"></video>`
      : `<div class="no-video">No video path</div>`}
  </div>

  <!-- PSI original text -->
  <div>
    <div class="section-label">PSI original annotation</div>
    <div class="psi-grid">
      <div class="psi-field" style="grid-column:1/-1">
        <div class="psi-label">Description</div>
        <div class="psi-val ${raw.description ? '' : 'empty'}">${esc(raw.description || '(empty)')}</div>
      </div>
      ${['pedestrian','goalRelated','roadUsersRelated','roadFactors','norms'].map(k => `
        <div class="psi-field">
          <div class="psi-label">${esc(k)}</div>
          <div class="psi-val ${promts[k] ? '' : 'empty'}">${esc(promts[k] || '(empty)')}</div>
        </div>`).join('')}
    </div>
  </div>

  <!-- Agent A & B thinking -->
  <div>
    <div class="section-label">Agent A &amp; B — visual analysis (Gemini)</div>
    <div class="ab-grid">
      ${cotBlock('Agent A · pedestrian motion', t.agent_A_thinking)}
      ${cotBlock('Agent B · scene environment', t.agent_B_thinking)}
    </div>
  </div>

  <!-- Rounds -->
  <div>
    <div class="section-label">Rounds (${rounds.length} total)</div>
    <div class="rounds-grid">
      ${rounds.map((rnd, ri) => roundCard(rnd, ri, rounds.length)).join('')}
    </div>
  </div>

  <!-- Final result -->
  <div>
    <div class="section-label">Final output</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${toulminBlock('grounds', t.grounds)}
      ${toulminBlock('warrant', t.warrant)}
      <div class="toulmin-block tb-answer">
        <div class="tb-header">Answer</div>
        <div class="tb-body ${t.answer === 'yes' ? 'answer-yes' : 'answer-no'}">${esc(t.answer || '—')}</div>
      </div>
      ${t.critic_reason ? `<div class="critic-bar ${t.critic_ok ? 'critic-ok' : 'critic-fail'}">
        <span style="font-weight:700;flex-shrink:0">${t.critic_ok ? '✓' : '✗'}</span>
        <span class="critic-reason">${esc(t.critic_reason)}</span>
      </div>` : ''}
    </div>
  </div>

</div>`;
}

function roundCard(rnd, ri, total) {
  const isLast = ri === total - 1;
  const ok = rnd.critic_ok;
  return `<div class="round-card">
    <div class="round-header" onclick="toggleRound(this)">
      <span class="round-num">Round ${rnd.round}</span>
      ${isLast ? '<span class="badge badge-ok" style="font-size:9px;">final</span>' : ''}
      <span class="round-status ${ok ? 'answer-yes' : 'answer-no'}">${ok ? '✓ Critic passed' : '✗ Critic failed'}</span>
      <span style="margin-left:auto;color:var(--text3);font-size:11px;">${ri === 0 ? '▾' : '▸'}</span>
    </div>
    <div class="round-body ${ri > 0 ? 'collapsed' : ''}">
      ${cotBlock('Agent C · grounds thinking', rnd.agent_C_thinking)}
      ${toulminBlock('grounds', rnd.grounds)}
      ${cotBlock('Agent D · warrant thinking', rnd.agent_D_thinking)}
      ${toulminBlock('warrant', rnd.warrant)}
      <div class="critic-bar ${ok ? 'critic-ok' : 'critic-fail'}">
        <span style="font-weight:700;flex-shrink:0">${ok ? '✓' : '✗'}</span>
        <span class="critic-reason">${esc(rnd.critic_reason || '—')}</span>
      </div>
    </div>
  </div>`;
}

function cotBlock(label, thinking) {
  if (!thinking) return `<div class="cot-block"><button class="cot-toggle" disabled>${esc(label)} — (none)</button></div>`;
  const id = 'cot-' + Math.random().toString(36).slice(2);
  return `<div class="cot-block">
    <button class="cot-toggle" onclick="toggleCot('${id}',this)">▸ ${esc(label)}</button>
    <div class="cot-content" id="${id}" style="display:none">${esc(thinking)}</div>
  </div>`;
}

function toulminBlock(type, text) {
  const icons = { grounds: '◉', warrant: '⟡' };
  return `<div class="toulmin-block tb-${type}">
    <div class="tb-header">${icons[type] || ''} ${type}</div>
    <div class="tb-body">${esc(text || '(empty)')}</div>
  </div>`;
}

function toggleRound(header) {
  const body = header.nextElementSibling;
  const chevron = header.querySelector('span:last-child');
  const collapsed = body.classList.toggle('collapsed');
  chevron.textContent = collapsed ? '▸' : '▾';
}

function toggleCot(id, btn) {
  const el = document.getElementById(id);
  const hidden = el.style.display === 'none';
  el.style.display = hidden ? 'block' : 'none';
  btn.textContent = btn.textContent.replace(hidden ? '▸' : '▾', hidden ? '▾' : '▸');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (!filtered.length) return;
  if (e.key === 'ArrowDown' || e.key === 'j') {
    e.preventDefault();
    const n = Math.min(currentIdx + 1, filtered.length - 1);
    selectItem(n);
    document.querySelector(`.list-item[data-i="${n}"]`)?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp' || e.key === 'k') {
    e.preventDefault();
    const n = Math.max(currentIdx - 1, 0);
    selectItem(n);
    document.querySelector(`.list-item[data-i="${n}"]`)?.scrollIntoView({ block: 'nearest' });
  }
});
</script>
</body>
</html>
